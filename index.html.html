<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HakoTaksi - Fixed Full Version</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <style>
        /* --- DARK THEME BASE --- */
        :root { 
            --primary: #FF6600; 
            --bg-dark: #121212; 
            --panel-dark: #1E1E1E; 
            --text-main: #FFFFFF;
            --text-sec: #A0A0A0;
            --input-bg: #2C2C2C;
            --chat-bubble-user: #FF6600;
            --chat-bubble-driver: #333333;
        }

        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: var(--bg-dark); color: var(--text-main); }
        #map { height: 100vh; width: 100%; z-index: 1; background: #121212; position: absolute; top: 0; left: 0; }

        /* MAIN UI PANEL */
        .ui-panel {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: var(--panel-dark); z-index: 1000;
            border-radius: 24px 24px 0 0; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
            padding: 25px; box-sizing: border-box;
            transition: transform 0.3s ease;
        }

        .brand {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: var(--primary); padding: 8px 24px;
            border-radius: 30px; font-weight: 900; font-size: 20px; z-index: 1000;
            backdrop-filter: blur(5px); border: 1px solid #333;
        }

        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        
        .address-input { 
            background: var(--input-bg); border: 1px solid #444; 
            color: var(--text-main);
            padding: 14px 15px; border-radius: 12px; font-size: 16px; width: 100%; box-sizing: border-box;
            outline: none; transition: 0.2s;
        }
        .address-input:focus { border-color: var(--primary); }

        /* --- TARIFFS --- */
        .tariff-scroll-container {
            display: flex; gap: 10px; overflow-x: auto; 
            margin-bottom: 20px; padding-bottom: 5px;
            scrollbar-width: none; /* Firefox */
        }
        .tariff-scroll-container::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .tariff-card {
            min-width: 100px; background: var(--input-bg);
            border: 2px solid transparent; border-radius: 12px;
            padding: 10px; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; opacity: 0.7;
        }
        .tariff-card.active {
            border-color: var(--primary); background: rgba(255, 102, 0, 0.1);
            opacity: 1; transform: scale(1.05);
        }
        .tariff-img { font-size: 24px; margin-bottom: 5px; }
        .tariff-name { font-size: 12px; font-weight: bold; }

        /* --- BUTTONS & TRIP INFO --- */
        .order-btn {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 18px; border-radius: 16px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 102, 0, 0.3); transition: 0.2s; margin-bottom: 10px;
        }
        .order-btn:active { transform: scale(0.98); }
        .order-btn:disabled { background: #555; cursor: not-allowed; }
        .secondary-btn { background: #333; box-shadow: none; }

        .trip-info-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #333;
        }
        .driver-info { display: flex; align-items: center; gap: 10px; }
        .driver-avatar { 
            width: 40px; height: 40px; background: #333; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .driver-name { font-weight: bold; font-size: 16px; }
        .car-model { font-size: 12px; color: var(--text-sec); }
        .price-tag { font-size: 24px; font-weight: 900; color: var(--text-main); }
        .price-label { font-size: 12px; color: var(--text-sec); text-align: right; }
        .trip-status { display: none; }
        
        /* --- СТИЛИ МАШИНЫ --- */
        .car-icon-wrapper {
            width: 50px; height: 50px;
            display: flex; justify-content: center; align-items: center;
            will-change: transform; 
        }
        /* Класс для увеличения минивэна */
        .car-icon-wrapper.car-large svg {
            width: 65px; height: 65px; /* Увеличиваем SVG */
            transform: translateY(-5px); /* Чуть приподнимаем из-за размера */
        }

        /* --- CHAT STYLES --- */
        .chat-panel {
            height: 70vh; /* Почти на весь экран */
            display: flex; flex-direction: column;
            transform: translateY(100%); /* Скрыт по умолчанию */
            z-index: 2000; /* Поверх основной панели */
        }
        .chat-panel.open { transform: translateY(0); }

        .chat-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; font-weight: bold; font-size: 18px;
        }
        .chat-close-btn { background: none; border: none; color: var(--text-sec); font-size: 24px; cursor: pointer; }

        .chat-messages-area {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
            padding-right: 5px; margin-bottom: 15px;
        }
        /* Скроллбар для чата */
        .chat-messages-area::-webkit-scrollbar { width: 4px; }
        .chat-messages-area::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

        .message-bubble {
            max-width: 80%; padding: 10px 14px; border-radius: 18px;
            font-size: 14px; line-height: 1.4; width: fit-content;
        }
        .msg-user {
            background: var(--chat-bubble-user); color: white;
            align-self: flex-end; border-bottom-right-radius: 4px;
        }
        .msg-driver {
            background: var(--chat-bubble-driver); color: var(--text-main);
            align-self: flex-start; border-bottom-left-radius: 4px;
        }

        .chat-input-area { display: flex; gap: 10px; }
        .chat-send-btn {
            background: var(--primary); color: white; border: none;
            padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="brand">HakoTaksi</div>
<div id="map"></div>

<div class="ui-panel" id="order-panel">
    <div id="order-form">
        <div class="input-group">
            <input type="text" id="from-input" class="address-input" placeholder="Откуда?" value="Москва, Тверская 1">
            <input type="text" id="to-input" class="address-input" placeholder="Куда?" value="Москва, Арбат 20">
        </div>
        <div id="tariff-list" class="tariff-scroll-container"></div>
        <button class="order-btn" onclick="startRide()">Рассчитать и поехать</button>
    </div>

    <div id="trip-screen" class="trip-status">
        <div class="trip-info-row">
            <div class="driver-info">
                <div class="driver-avatar">🚖</div>
                <div>
                    <div class="driver-name" id="ui-driver-name">Водитель</div>
                    <div class="car-model">Kia K5 • х000хх777</div>
                </div>
            </div>
            <div>
                <div class="price-tag" id="ui-price">0 ₽</div>
                <div class="price-label" id="ui-tariff-label">Эконом</div>
            </div>
        </div>

        <div style="color: #777; margin-bottom: 15px; font-size: 14px;" id="status-text">
            Маршрут построен. Водитель едет к вам.
        </div>
        
        <button class="order-btn" style="background: #444;" onclick="toggleChat(true)">💬 Чат с водителем</button>
        <button class="order-btn secondary-btn" onclick="location.reload()">Отменить поездку</button>
    </div>
</div>

<div class="ui-panel chat-panel" id="chat-panel">
    <div class="chat-header">
        <span>Чат с водителем</span>
        <button class="chat-close-btn" onclick="toggleChat(false)">×</button>
    </div>
    <div id="chat-messages" class="chat-messages-area">
        </div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" class="address-input" placeholder="Сообщение..." onkeypress="handleChatKeyPress(event)">
        <button class="chat-send-btn" onclick="sendMessage()">Отправить</button>
    </div>
</div>

<script>
    // --- ДАННЫЕ ---
    const DRIVERS = ["Александр", "Дмитрий", "Иван", "Магомед"];
    const BASE_PRICE = 100; 
    const PRICE_PER_KM = 35; 
    const CAR_SPEED_KMH = 60; 

    // --- НАСТРОЙКИ ТАРИФОВ ---
    const TARIFFS = [
        { id: 'eco', name: 'Эконом', mult: 1.0, icon: '🚕' },
        { id: 'com', name: 'Комфорт', mult: 1.4, icon: '🚖' },
        { id: 'biz', name: 'Бизнес', mult: 2.5, icon: '🚘' },
        // ID 'mini' важен для логики выбора машины
        { id: 'mini', name: 'Минивэн', mult: 2.0, icon: '🚐' } 
    ];
    let currentTariffIndex = 0;

    // --- SVG МАШИН ---

    // Обычный седан (старый)
    const SEDAN_SVG = `
    <svg viewBox="0 0 50 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="25" cy="50" rx="22" ry="42" fill="black" opacity="0.4" filter="blur(4px)"/>
        <path d="M10,15 Q25,0 40,15 L42,85 Q42,95 25,95 Q8,95 8,85 Z" fill="#111" stroke="#222" stroke-width="1"/>
        <path d="M11,28 L39,28 L38,48 L12,48 Z" fill="#222" />
        <path d="M12,68 L38,68 L38,78 L12,78 Z" fill="#222" />
        <rect x="15" y="50" width="20" height="12" rx="2" fill="#FF6600" />
        <rect x="10" y="92" width="8" height="3" fill="#800" />
        <rect x="32" y="92" width="8" height="3" fill="#800" />
    </svg>`;

    // НОВЫЙ Минивэн (более квадратный и массивный зад)
    const MINIVAN_SVG = `
    <svg viewBox="0 0 50 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="25" cy="50" rx="24" ry="44" fill="black" opacity="0.4" filter="blur(4px)"/>
        <path d="M8,15 Q25,2 42,15 L44,88 Q44,98 25,98 Q6,98 6,88 Z" fill="#111" stroke="#222" stroke-width="1"/>
        <path d="M9,25 L41,25 L40,50 L10,50 Z" fill="#222" /> <path d="M10,65 L40,65 L40,80 L10,80 Z" fill="#222" /> <rect x="14" y="52" width="22" height="10" rx="2" fill="#FF6600" />
        <rect x="8" y="94" width="8" height="4" fill="#800" />
        <rect x="34" y="94" width="8" height="4" fill="#800" />
    </svg>`;

    // --- КАРТА ---
    const map = L.map('map', { zoomControl: false }).setView([55.7558, 37.6173], 13);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; CartoDB', maxZoom: 19
    }).addTo(map);

    let taxiMarker = null;
    let routePolyline = null;
    let startMarker = null; let endMarker = null;
    let isDriving = false;
    let currentDriverName = "";

    // --- ИНИЦИАЛИЗАЦИЯ ---
    function initTariffs() {
        const container = document.getElementById('tariff-list');
        container.innerHTML = '';
        TARIFFS.forEach((t, index) => {
            const el = document.createElement('div');
            el.className = `tariff-card ${index === currentTariffIndex ? 'active' : ''}`;
            el.innerHTML = `<div class="tariff-img">${t.icon}</div><div class="tariff-name">${t.name}</div>`;
            el.onclick = () => { currentTariffIndex = index; initTariffs(); };
            container.appendChild(el);
        });
    }
    initTariffs();

    // --- ФУНКЦИИ КАРТЫ И ПОЕЗДКИ ---
    async function getCoordinates(address) {
        try {
            const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1`);
            const d = await r.json();
            if (d.length) return [parseFloat(d[0].lat), parseFloat(d[0].lon)];
        } catch(e){}
        const c = map.getCenter(); return [c.lat, c.lng];
    }

    async function getRouteData(start, end) {
        try {
            const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`);
            const d = await r.json();
            if (d.routes && d.routes.length) return { coordinates: d.routes[0].geometry.coordinates.map(c => [c[1], c[0]]), distanceMeters: d.routes[0].distance };
        } catch(e){}
        return { coordinates: [start, end], distanceMeters: 1000 };
    }

    async function startRide() {
        if (isDriving) return;
        const btn = document.querySelector('.order-btn');
        btn.innerText = "Поиск машины..."; btn.disabled = true;

        const startCoords = await getCoordinates(document.getElementById('from-input').value);
        const endCoords = await getCoordinates(document.getElementById('to-input').value);
        const routeData = await getRouteData(startCoords, endCoords);

        const selectedTariff = TARIFFS[currentTariffIndex];
        const finalPrice = Math.round((BASE_PRICE + ((routeData.distanceMeters / 1000) * PRICE_PER_KM)) * selectedTariff.mult);
        currentDriverName = DRIVERS[Math.floor(Math.random() * DRIVERS.length)];

        // --- ЛОГИКА ВЫБОРА МАШИНЫ ---
        let carSvgToUse = SEDAN_SVG; // По умолчанию седан
        let carSizeClass = ''; // Обычный размер
        
        // Если выбран Минивэн
        if (selectedTariff.id === 'mini') {
            carSvgToUse = MINIVAN_SVG; // Используем новую SVG
            carSizeClass = 'car-large'; // Добавляем класс для увеличения
        }

        // Обновление UI
        document.getElementById('order-form').style.display = 'none';
        document.getElementById('trip-screen').style.display = 'block';
        document.getElementById('ui-price').innerText = finalPrice + " ₽";
        document.getElementById('ui-tariff-label').innerText = selectedTariff.name;
        document.getElementById('ui-driver-name').innerText = currentDriverName;

        // Чистка карты
        if(startMarker) map.removeLayer(startMarker); if(endMarker) map.removeLayer(endMarker);
        if(routePolyline) map.removeLayer(routePolyline); if(taxiMarker) map.removeLayer(taxiMarker);

        // Отрисовка маршрута
        startMarker = L.circleMarker(startCoords, {color: '#555', radius: 5}).addTo(map);
        endMarker = L.marker(endCoords).addTo(map);
        routePolyline = L.polyline(routeData.coordinates, { color: '#FF6600', weight: 5, opacity: 0.8, lineCap: 'round' }).addTo(map);
        map.fitBounds(routePolyline.getBounds(), {padding: [50, 50]});

        // СОЗДАНИЕ ИКОНКИ МАШИНЫ (с учетом типа и размера)
        const taxiIcon = L.divIcon({
            className: 'custom-taxi',
            // Вставляем нужный SVG и добавляем класс размера если нужно
            html: `<div id="taxi-sprite" class="car-icon-wrapper ${carSizeClass}">${carSvgToUse}</div>`,
            iconSize: [50, 50], iconAnchor: [25, 25]
        });
        taxiMarker = L.marker(routeData.coordinates[0], {icon: taxiIcon, zIndexOffset: 1000}).addTo(map);

        isDriving = true;
        // Приветственное сообщение в чат
        addChatMessage('driver', `Здравствуйте! Я ${currentDriverName}, еду к вам.`);
        await simulateRealDrive(routeData.coordinates);
    }

    // ИСПРАВЛЕНА ОШИБКА ЗДЕСЬ (добавлено слово function)
    async function simulateRealDrive(path) {
        const sprite = document.getElementById('taxi-sprite');
        const speedMs = (CAR_SPEED_KMH * 1000) / 3600000;
        for (let i = 0; i < path.length - 1; i++) {
            if (!isDriving) break;
            const start = L.latLng(path[i]), end = L.latLng(path[i+1]);
            const dist = map.distance(start, end);
            if (dist < 0.1) continue;
            const angle = calculateBearing(start.lat, start.lng, end.lat, end.lng);
            if (sprite) sprite.style.transform = `rotate(${angle}deg)`;
            routePolyline.setLatLngs(path.slice(i));
            await animateMarker(start, end, dist / speedMs);
            if (i % 30 === 0) map.panTo(end);
        }
        if(isDriving) { alert("Приехали!"); isDriving = false; }
    }

    function animateMarker(start, end, duration) {
        return new Promise(resolve => {
            let startT = null;
            function frame(time) {
                if(!startT) startT = time;
                const progress = Math.min((time - startT) / duration, 1);
                taxiMarker.setLatLng([start.lat + (end.lat - start.lat) * progress, start.lng + (end.lng - start.lng) * progress]);
                if(progress < 1) requestAnimationFrame(frame); else resolve();
            }
            requestAnimationFrame(frame);
        });
    }

    function calculateBearing(lat1, lon1, lat2, lon2) {
        const toRad = d => d * Math.PI / 180, toDeg = r => r * 180 / Math.PI;
        const dLon = toRad(lon2 - lon1);
        const y = Math.sin(dLon) * Math.cos(toRad(lat2));
        const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) - Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
        return (toDeg(Math.atan2(y, x)) + 360) % 360;
    }

    // --- ФУНКЦИИ ЧАТА ---

    function toggleChat(open) {
        const panel = document.getElementById('chat-panel');
        if(open) {
            panel.classList.add('open');
            // Прокрутка вниз при открытии
            const msgArea = document.getElementById('chat-messages');
            msgArea.scrollTop = msgArea.scrollHeight;
        } else {
            panel.classList.remove('open');
        }
    }

    function handleChatKeyPress(e) {
        if(e.key === 'Enter') sendMessage();
    }

    function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        addChatMessage('user', text);
        input.value = '';

        // --- ЛОГИКА ОТВЕТА ВОДИТЕЛЯ ---
        // Проверяем, содержит ли сообщение фразу в любом регистре
        if (text.toLowerCase().includes('когда приедете')) {
            setTimeout(() => {
                driverReply("Скоро");
            }, 1500); // Задержка 1.5 секунды для реалистичности
        }
    }

    function driverReply(text) {
        addChatMessage('driver', text);
    }

    function addChatMessage(sender, text) {
        const msgArea = document.getElementById('chat-messages');
        const bubble = document.createElement('div');
        // Класс msg-user или msg-driver
        bubble.className = `message-bubble msg-${sender}`;
        bubble.innerText = text;
        msgArea.appendChild(bubble);
        // Автопрокрутка вниз
        msgArea.scrollTop = msgArea.scrollHeight;
    }
</script>
</body>
</html>
